<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="app" data-screen="start">
    <section id="screen-start">
      <h1>Color Game</h1>
      <p class="intro">
        In each round, a random color will fill the screen for 3 seconds. Once it
        disappears, use the H, S, and V sliders to reproduce it from memory, using
        a preview circle that shows your current guess. You get 5 rounds; the closer
        your guess, the higher your score.
      </p>
      <button id="start-btn">Start</button>
    </section>

    <section id="screen-play">
      <div id="round-counter">Round 1 / 5</div>
      <div id="reveal-timer"></div>
      <div id="target-panel"></div>
      <div id="guess-panel">
        <div id="guess-swatch"></div>
        <div class="sliders">
          <label>H <input type="range" id="slider-h" min="0" max="360" value="180"><span id="val-h">180</span></label>
          <label>S <input type="range" id="slider-s" min="0" max="100" value="50"><span id="val-s">50</span></label>
          <label>V <input type="range" id="slider-v" min="0" max="100" value="50"><span id="val-v">50</span></label>
        </div>
        <button id="submit-btn">Submit Guess</button>
      </div>
    </section>

    <section id="screen-summary">
      <h2>Game Over</h2>
      <p id="total-score"></p>
      <div id="summary-rows"></div>
      <button id="play-again-btn">Play Again</button>
    </section>
  </div>
</body>
</html>
