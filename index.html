<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="app" data-screen="start">
    <section id="screen-start">
      <h1>Color Game</h1>
      <button id="start-btn">Start</button>
    </section>

    <section id="screen-play">
      <div id="round-counter">Round 1 / 5</div>
      <div id="target-panel"></div>
      <div id="guess-panel">
        <p>Make your guess</p>
      </div>
    </section>

    <section id="screen-summary">
      <p>Summary screen (coming soon)</p>
    </section>
  </div>
</body>
</html>
